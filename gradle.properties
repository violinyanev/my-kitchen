# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx12g -Dfile.encoding=UTF-8 -XX:+UseParallelGC -Xshare:off

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true
# Bypass AGP 9.x enforcement that blocks com.android.library + kotlin.multiplatform combination.
# Required for CMP 1.11.1 resource packaging (uses android.sourceSets API unavailable in the new KMP plugin).
android.builtInKotlin=false
android.newDsl=false

# Kotlin
kotlin.code.style=official
kotlin.mpp.androidSourceSetLayoutV2AndroidStyleDirs.nowarn=true
kotlin.native.ignoreDisabledTargets=true

# Compose
org.jetbrains.compose.experimental.wasm.enabled=true

# Gradle optimizations
org.gradle.configuration-cache=true
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.vfs.watch=true

