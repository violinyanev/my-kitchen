name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
    JAVA_VERSION: 17
    PYTHON_VERSION: '3.14'
    NODE_VERSION: '22'

    # Note: ANDROID_HOME and ANDROID_SDK_ROOT are intentionally NOT overridden here.
    # The ubuntu-latest runner provides a pre-installed Android SDK at the default path.
    # Overriding these with non-existent paths would break all Gradle builds (including
    # the web app build, since the shared module uses the android.library plugin).

    # Reference values used by Copilot when generating build/test commands
    PYTHON_REQUIREMENTS: 'backend/image/requirements.txt'
    GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    GRADLE_WRAPPER: ${{ github.workspace }}/gradlew # Ensure the Gradle wrapper is used
    GRADLE_PROPERTIES: ${{ github.workspace }}/gradle.properties # Ensure the Gradle properties file is used
    GRADLE_BUILD_DIR: ${{ github.workspace }}/app/build
    KOVER_REPORT_PATH: ${{ github.workspace }}/app/build/reports/kover/reportDebug.xml
    COMMENTS_TOKEN: ${{ secrets.COMMENTS_TOKEN }} # Ensure the token is set for comments
    MIN_COVERAGE_OVERALL: 10
    MIN_COVERAGE_CHANGED_FILES: 80
    COVERAGE_COUNTER_TYPE: LINE

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: 'true'

      # Setup Java et al
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify Java installation
        run: |
          echo "☀️  Verifying Java installation..."
          java -version
          echo "JAVA_HOME: $JAVA_HOME"
          echo "✅ Java setup successful"

      # Setup Node.js - required for Kotlin/JS (KMP web target) builds
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify Node.js installation
        run: |
          echo "🟢 Verifying Node.js installation..."
          node --version
          npm --version
          echo "✅ Node.js setup successful"

      - name: Install npm dependencies
        # Installs commitlint and other devDependencies from root package.json
        run: npm install
        working-directory: ${{ github.workspace }}

      # Setup the test backend
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/image/requirements.txt

      - name: Verify Python installation
        run: |
          echo "🐍 Verifying Python installation..."
          python --version
          python3 --version
          echo "✅ Python setup successful"

      # Copilot Instructions: Code Quality Requirements
      # When creating or modifying files, ensure all source files end with a newline character.
      # This includes .kt, .java, .py, .yml, .yaml, .md, .gradle, .kts, .properties, .json, .txt, and .sh files.
      # The check-final-newlines.yml workflow will enforce this requirement.
      - name: Verify all files end with newlines (Copilot requirement)
        run: |
          echo "ℹ️  Copilot Requirement: All source files must end with a newline character"
          echo "This is enforced by the check-final-newlines.yml workflow"
