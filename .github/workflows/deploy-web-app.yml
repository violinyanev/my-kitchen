name: Deploy Web App

# Deploy web app to GitHub Pages on push to main branch (after PR merges)
on:
  push:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        lfs: 'true'

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Build web app (WasmJs)
      # --warning-mode=fail is intentionally absent: Kover 0.9.8 (PrepareKover.kt:29) and
      # AGP (VariantDependenciesBuilder.java:279) both emit "Project object as dependency
      # notation" deprecations internally. Both are tracked upstream; neither has a patch yet.
      run: ./gradlew :webApp:wasmJsBrowserDistribution

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./webApp/build/dist/wasmJs/productionExecutable

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

