name: Tests

# Only pushes and PRs against the main branch are built
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
    group: ${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build Android APK
      run: ./gradlew :androidApp:assembleDebug

    - name: Build desktop app
      run: ./gradlew :desktopApp:compileKotlin

    - name: Run unit tests
      run: ./gradlew :shared:domain:desktopTest :shared:data:desktopTest

    - name: Run server tests
      run: ./gradlew :server:test

    - name: Run Detekt
      run: ./gradlew detekt

  web:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build web app (WasmJs)
      run: ./gradlew :webApp:wasmJsBrowserDistribution

  ios:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build iOS frameworks
      run: |
        ./gradlew :shared:ui:linkDebugFrameworkIosArm64 \
                  :shared:ui:linkDebugFrameworkIosX64 \
                  :shared:ui:linkDebugFrameworkIosSimulatorArm64

    - name: Build iOS app (Xcode)
      run: |
        cd iosApp
        xcodebuild \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          build

  backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/image/requirements.txt

    - name: Run backend unit tests
      run: cd backend/image && python3 -m unittest discover

    - name: Test backend startup
      run: |
        export RECIPES_SECRET_KEY=TestKey
        python3 backend/image/app.py backend/seed_data &
        sleep 3
        curl --fail http://localhost:5000/health

  copilot-retrigger-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Test copilot retrigger script in dry-run mode
      env:
        GITHUB_TOKEN: ${{ secrets.COMMENTS_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        echo "Testing copilot retrigger script in dry-run mode..."
        python scripts/copilot_retrigger.py --dry-run

