name: Tests

# Only pushes and PRs against the main branch are built
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
    group: ${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
    JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build Android APK
      run: ./gradlew :androidApp:assembleDebug

    - name: Build desktop app
      run: ./gradlew :desktopApp:compileKotlin

    - name: Run unit tests and generate coverage report
      run: ./gradlew koverXmlReport

    - name: Run Detekt
      run: ./gradlew detekt

    - name: Add coverage report to PR
      uses: mi-kas/kover-report@v2.4
      if: github.event_name == 'pull_request'
      with:
        path: ${{ github.workspace }}/build/reports/kover/report.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        title: Code Coverage
        update-comment: true
        min-coverage-overall: 10
        min-coverage-changed-files: 0
        coverage-counter-type: LINE

  web:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build web app (WasmJs)
      run: ./gradlew :webApp:wasmJsBrowserDistribution

  ios:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build iOS frameworks
      run: |
        ./gradlew :shared:ui:linkDebugFrameworkIosArm64 \
                  :shared:ui:linkDebugFrameworkIosSimulatorArm64

  instrumentedtests:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        api-level: [28, 31, 34, 35, 36]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mykitchen
          POSTGRES_PASSWORD: mykitchen
          POSTGRES_DB: mykitchen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build server fat JAR
      run: ./gradlew :server:buildFatJar

    - name: Start Ktor server
      run: nohup java -jar server/build/libs/server-all.jar > /tmp/server.log 2>&1 &
      env:
        JWT_SECRET: test-secret-for-ci
        DATABASE_DRIVER: org.postgresql.Driver
        DATABASE_URL: jdbc:postgresql://localhost:5432/mykitchen
        DATABASE_USER: mykitchen
        DATABASE_PASSWORD: mykitchen

    - name: Wait for server to be ready
      run: |
        for i in $(seq 1 30); do
          if curl --fail --silent http://localhost:5000/health; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "Server did not start in time"
        cat /tmp/server.log
        exit 1

    - name: Get AVD info
      id: avd-info
      uses: ./.github/actions/get-avd-info
      with:
        api-level: ${{ matrix.api-level }}

    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        arch: ${{ steps.avd-info.outputs.arch }}
        target: ${{ steps.avd-info.outputs.target }}
        script: ./gradlew connectedCheck --stacktrace


