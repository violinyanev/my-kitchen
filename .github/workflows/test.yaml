name: Tests

# Only pushes and PRs against the main branch are built
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
    group: ${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build Android APK
      run: ./gradlew :androidApp:assembleDebug

    - name: Build desktop app
      run: ./gradlew :desktopApp:compileKotlin

    - name: Run unit tests
      run: ./gradlew :shared:domain:desktopTest :shared:data:desktopTest

    - name: Run server tests
      run: ./gradlew :server:test

    - name: Run Detekt
      run: ./gradlew detekt

  web:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build web app (WasmJs)
      run: ./gradlew :webApp:wasmJsBrowserDistribution

  ios:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build iOS frameworks
      run: |
        ./gradlew :shared:ui:linkDebugFrameworkIosArm64 \
                  :shared:ui:linkDebugFrameworkIosSimulatorArm64


