name: Tests

# Only pushes and PRs against the main branch are built
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:

concurrency:
    group: ${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
    JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build Android APK (debug)
      run: ./gradlew :androidApp:assembleDebug

    - name: Build Android APK (release)
      run: ./gradlew :androidApp:assembleRelease --stacktrace

    - name: Build desktop app
      run: ./gradlew :desktopApp:compileKotlin

    - name: Run unit tests, generate coverage report, and enforce 80% threshold
      run: ./gradlew koverXmlReport koverVerify

    - name: Publish unit test results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Unit Tests
        path: '**/build/test-results/**/*.xml'
        reporter: java-junit
        fail-on-error: false
        fail-on-empty: false

    - name: Run Detekt
      run: ./gradlew detekt

    - name: Add coverage report to PR
      uses: mi-kas/kover-report@v2.5
      if: github.event_name == 'pull_request'
      with:
        path: ${{ github.workspace }}/build/reports/kover/report.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        title: Code Coverage
        update-comment: true
        min-coverage-overall: 80
        min-coverage-changed-files: 60
        coverage-counter-type: LINE

  web:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ github.head_ref || github.ref }}

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Update Wasm yarn lock if outdated
      run: ./gradlew kotlinWasmUpgradeYarnLock

    - name: Commit updated yarn lock if changed
      if: github.event_name == 'pull_request'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        if [ -n "$(git status --porcelain kotlin-js-store/wasm/yarn.lock)" ]; then
          git add kotlin-js-store/wasm/yarn.lock
          git commit -m "chore: update wasm yarn lock"
          git push origin HEAD:${{ github.head_ref }}
        fi

    - name: Build web app (WasmJs)
      run: ./gradlew :webApp:wasmJsBrowserDistribution

  e2etests:
    runs-on: ubuntu-latest
    needs: web

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: mykitchen
          POSTGRES_PASSWORD: mykitchen
          POSTGRES_DB: mykitchen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build server fat JAR
      run: ./gradlew :server:buildFatJar

    - name: Build web app (WasmJs)
      run: ./gradlew :webApp:wasmJsBrowserDistribution

    - name: Start Ktor server
      run: nohup java -jar server/build/libs/server-all.jar > /tmp/server.log 2>&1 &
      env:
        JWT_SECRET: test-secret-for-ci
        DATABASE_DRIVER: org.postgresql.Driver
        DATABASE_URL: jdbc:postgresql://localhost:5432/mykitchen
        DATABASE_USER: mykitchen
        DATABASE_PASSWORD: mykitchen

    - name: Wait for server to be ready
      run: |
        for i in $(seq 1 30); do
          if curl --fail --silent http://localhost:5000/health; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "Server did not start in time"
        cat /tmp/server.log
        exit 1

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: e2e/package-lock.json

    - name: Install Playwright dependencies
      working-directory: e2e
      run: npm install

    - name: Install Playwright browsers
      working-directory: e2e
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      working-directory: e2e
      run: npx playwright test
      env:
        SERVER_URL: http://localhost:5000

    - name: Upload Playwright report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 14

  ios:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v7
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build iOS frameworks
      run: |
        ./gradlew :shared:ui:linkDebugFrameworkIosArm64 \
                  :shared:ui:linkDebugFrameworkIosSimulatorArm64

  instrumentedtests:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        api-level: [28, 31, 34, 35, 36]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: mykitchen
          POSTGRES_PASSWORD: mykitchen
          POSTGRES_DB: mykitchen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v7
      with:
        lfs: 'true'

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build server fat JAR
      run: ./gradlew :server:buildFatJar

    - name: Start Ktor server
      run: nohup java -jar server/build/libs/server-all.jar > /tmp/server.log 2>&1 &
      env:
        JWT_SECRET: test-secret-for-ci
        DATABASE_DRIVER: org.postgresql.Driver
        DATABASE_URL: jdbc:postgresql://localhost:5432/mykitchen
        DATABASE_USER: mykitchen
        DATABASE_PASSWORD: mykitchen

    - name: Wait for server to be ready
      run: |
        for i in $(seq 1 30); do
          if curl --fail --silent http://localhost:5000/health; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "Server did not start in time"
        cat /tmp/server.log
        exit 1

    - name: Get AVD info
      id: avd-info
      uses: ./.github/actions/get-avd-info
      with:
        api-level: ${{ matrix.api-level }}

    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        arch: ${{ steps.avd-info.outputs.arch }}
        target: ${{ steps.avd-info.outputs.target }}
        script: ./gradlew connectedCheck --stacktrace

    - name: Publish instrumented test results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Instrumented Tests (API ${{ matrix.api-level }})
        path: '**/build/outputs/androidTest-results/connected/**/*.xml'
        reporter: java-junit
        fail-on-error: false
        fail-on-empty: false

