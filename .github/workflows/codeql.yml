name: "CodeQL"

# Advanced setup to replace the default CodeQL configuration.
# Only analyzes Java/Kotlin — Python and JavaScript/TypeScript have been removed
# from this project (KMP rewrite uses Kotlin exclusively for application code).
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    continue-on-error: true  # CodeQL extractor doesn't yet support Kotlin 2.4.0; non-blocking until it does
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build JVM targets for CodeQL
        run: ./gradlew :server:buildFatJar :desktopApp:compileKotlin --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
